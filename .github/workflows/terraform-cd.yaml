name: Terraform CD

# Deploy infrastructure for the development environment.
#
# Triggers:
#   - Push to the develop branch (automatically runs plan and apply after passing the OPA gate)
#   - Manual execution via workflow_dispatch with action = plan | apply | destroy
#
# Execution Flow:
#   plan | apply  -->  plan --> opa-gate --> deploy --> notify-apply
#   destroy       -->  destroy --> notify-destroy
#
# Destroy Flow (workflow_dispatch only):
#   - Infrastructure destruction must be triggered manually and is never executed automatically.
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   BUCKET_TF_STATE      (S3 bucket used to store Terraform state)
#   SLACK_WEBHOOK_URL

on:
  # push:
  #   branches:
  #     - main
  #     - develop
  #   paths:
  #     - 'environments/dev/**'
  #     - 'modules/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action: plan | apply | destroy'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  AWS_REGION: ap-southeast-1
  TERRAFORM_VERSION: 1.8.0
  BUCKET_TF_STATE: ${{ secrets.BUCKET_TF_STATE }}
  TF_IN_AUTOMATION: 'true'

# =============================================================================
# JOB 1: Terraform Plan
# Initialize Terraform using the production S3 backend,
# generate an execution plan, and export the plan as JSON for OPA evaluation.
# The binary plan file is uploaded as an artifact so that the apply job
# can download and reuse the exact approved plan.
# =============================================================================
jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.action == 'plan' ||
      github.event.inputs.action == 'apply'
    defaults:
      run:
        shell: bash
        working-directory: ./environments/dev
    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -backend-config="bucket=$BUCKET_TF_STATE" -input=false -no-color

      - name: Terraform plan
        id: plan
        run: |
          set +e
          terraform plan \
            -out=tfplan \
            -detailed-exitcode \
            -no-color \
            -input=false \
            2>&1 | tee ${{ runner.temp }}/plan-output.txt
          EXITCODE=$?
          set -e
          echo "exitcode=$EXITCODE" >> $GITHUB_OUTPUT

          # exit 0 = no changes, exit 2 = changes present, exit 1 = error
          if [ "$EXITCODE" -eq 1 ]; then
            echo "Terraform plan failed."
            exit 1
          fi
          echo "Plan exit code: $EXITCODE (0=no changes, 2=changes)"

      - name: Export plan to JSON
        run: |
          terraform show -json tfplan > ${{ runner.temp }}/tfplan.json
          jq -e . ${{ runner.temp }}/tfplan.json > /dev/null
          echo "Plan JSON exported successfully."

      - name: Upload binary plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-binary-${{ github.sha }}
          path: environments/dev/tfplan
          retention-days: 5
          if-no-files-found: error

      - name: Upload JSON plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-json-${{ github.sha }}
          path: ${{ runner.temp }}/tfplan.json
          retention-days: 5
          if-no-files-found: error

      - name: Write plan to Step Summary
        run: |
          echo "## Terraform Plan - DEV" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat ${{ runner.temp }}/plan-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

# =============================================================================
# JOB 2: OPA Policy Gate
# Download the Terraform plan JSON artifact and evaluate it against
# all three OPA policy files.
# Deployment is allowed only when all deny violations equal zero.
# Warning violations are printed to the workflow logs but do not
# block or fail the pipeline.
# =============================================================================
  opa-gate:
    name: OPA Policy Gate
    runs-on: ubuntu-latest
    needs: plan
    if: |
      github.event.inputs.action == 'plan' ||
      github.event.inputs.action == 'apply'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JSON plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-json-${{ github.sha }}
          path: ${{ runner.temp }}/

      - name: Setup OPA
        run: |
          mkdir -p /tmp/opa
          curl -sSL -o /tmp/opa/opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x /tmp/opa/opa
          /tmp/opa/opa version

      - name: OPA - Security policies
        id: opa_security
        run: |
          RESULT=$(/tmp/opa/opa eval \
            --format json \
            --data policies/security.rego \
            --input ${{ runner.temp }}/tfplan.json \
            "data.terraform.security.deny")

          COUNT=$(echo "$RESULT" | jq '.result[0].expressions[0].value | length')
          echo "count=$COUNT" >> $GITHUB_OUTPUT

          if [ "$COUNT" -gt 0 ]; then
            echo "--- Security violations: $COUNT ---"
            echo "$RESULT" | jq -r '.result[0].expressions[0].value[]' | sed 's/^/  [DENY] /'
            exit 1
          fi
          echo "Security: PASS (0 violations)"

      - name: OPA - Networking policies
        id: opa_networking
        run: |
          RESULT=$(/tmp/opa/opa eval \
            --format json \
            --data policies/networking.rego \
            --input ${{ runner.temp }}/tfplan.json \
            "data.terraform.networking.deny")

          COUNT=$(echo "$RESULT" | jq '.result[0].expressions[0].value | length')
          echo "count=$COUNT" >> $GITHUB_OUTPUT

          if [ "$COUNT" -gt 0 ]; then
            echo "--- Networking violations: $COUNT ---"
            echo "$RESULT" | jq -r '.result[0].expressions[0].value[]' | sed 's/^/  [DENY] /'
            exit 1
          fi
          echo "Networking: PASS (0 violations)"

      - name: OPA - Compliance policies (CIS Benchmark)
        id: opa_compliance
        run: |
          RESULT=$(/tmp/opa/opa eval \
            --format json \
            --data policies/compliance.rego \
            --input ${{ runner.temp }}/tfplan.json \
            "data.terraform.compliance.deny")

          COUNT=$(echo "$RESULT" | jq '.result[0].expressions[0].value | length')
          echo "count=$COUNT" >> $GITHUB_OUTPUT

          if [ "$COUNT" -gt 0 ]; then
            echo "--- Compliance violations: $COUNT ---"
            echo "$RESULT" | jq -r '.result[0].expressions[0].value[]' | sed 's/^/  [DENY] /'
            exit 1
          fi
          echo "Compliance: PASS (0 violations)"

      - name: OPA - Warnings (non-blocking)
        if: always()
        run: |
          for policy in security networking compliance; do
            RESULT=$(/tmp/opa/opa eval \
              --format json \
              --data "policies/${policy}.rego" \
              --input ${{ runner.temp }}/tfplan.json \
              "data.terraform.${policy}.warn" 2>/dev/null \
              || echo '{"result":[{"expressions":[{"value":[]}]}]}')

            COUNT=$(echo "$RESULT" | jq '.result[0].expressions[0].value | length' 2>/dev/null || echo 0)
            if [ "$COUNT" -gt 0 ]; then
              echo "--- ${policy} warnings: $COUNT ---"
              echo "$RESULT" | jq -r '.result[0].expressions[0].value[]' | sed "s/^/  [WARN] /"
            fi
          done

      - name: Upload OPA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opa-report-${{ github.sha }}
          path: ${{ runner.temp }}/tfplan.json
          retention-days: 7

      - name: Write OPA results to Step Summary
        if: always()
        run: |
          echo "## OPA Policy Gate - DEV" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Policy     | Result | Violations |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security   | ${{ steps.opa_security.outcome }} | ${{ steps.opa_security.outputs.count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Networking | ${{ steps.opa_networking.outcome }} | ${{ steps.opa_networking.outputs.count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Compliance | ${{ steps.opa_compliance.outcome }} | ${{ steps.opa_compliance.outputs.count }} |" >> $GITHUB_STEP_SUMMARY

# =============================================================================
# JOB 3: Terraform Apply
# Executes only when:
#   - Code is pushed to the develop branch (automatic deployment)
#   - workflow_dispatch is triggered with action = apply
#
# Downloads and applies the approved binary Terraform plan
# generated and uploaded by the Terraform Plan job.
# =============================================================================
  deploy:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: opa-gate
    if: github.event.inputs.action == 'apply'
    # if: |
    #   (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
    #   (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
  
    defaults:
      run:
        shell: bash
        working-directory: ./environments/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -backend-config="bucket=$BUCKET_TF_STATE" -input=false -no-color

      - name: Download binary plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-binary-${{ github.sha }}
          path: environments/dev/

      - name: Terraform apply
        run: terraform apply -auto-approve -no-color -input=false tfplan

      - name: Capture Terraform outputs
        run: terraform output -json > ${{ runner.temp }}/outputs.json

      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: tf-outputs-${{ github.sha }}
          path: ${{ runner.temp }}/outputs.json
          retention-days: 30

      - name: Write deploy summary
        run: |
          echo "## Deploy Completed - DEV" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch      | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit      | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor       | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

# =============================================================================
# JOB 4: Notify Apply
# Report the overall status of the deployment workflow,
# including the results of the plan → opa-gate → deploy stages.
# =============================================================================
  notify-apply:
    name: Notify Apply
    runs-on: ubuntu-latest
    needs: [plan, opa-gate, deploy]
    if: |
      always() &&
      (github.event.inputs.action == 'plan' ||
      github.event.inputs.action == 'apply')
 
    steps:
      - name: Notify Slack
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: >-
            ${{
              needs.deploy.result == 'success' && 'good' ||
              needs.deploy.result == 'skipped' && 'warning' ||
              needs.deploy.result == 'failure' && 'danger' ||
              needs['opa-gate'].result == 'failure' && 'danger' ||
              needs.plan.result == 'failure' && 'danger' ||
              'warning'
            }}
          SLACK_TITLE: "Terraform CD - DEV | Apply"
          SLACK_MESSAGE: |
            Branch    : ${{ github.ref_name }}
            Commit    : ${{ github.sha }}
            Actor     : ${{ github.actor }}
            Plan      : ${{ needs.plan.result }}
            OPA Gate  : ${{ needs['opa-gate'].result }}
            Deploy    : ${{ needs.deploy.result }}
          SLACK_FOOTER: "AWS Three-Tier Architecture | ${{ github.repository }}"

# =============================================================================
# JOB 5: Terraform Destroy
# Executes only when workflow_dispatch is triggered with action = destroy.
# Infrastructure destruction must be initiated manually and is never
# triggered automatically by any event.
# =============================================================================
  destroy:
    name: Destroy DEV Infrastructure
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'

    defaults:
      run:
        shell: bash
        working-directory: ./environments/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -backend-config="bucket=$BUCKET_TF_STATE" -input=false -no-color

      - name: Terraform destroy plan
        id: destroy_plan
        run: terraform plan -destroy -out=tfplan_destroy -no-color

      - name: Destroy plan status
        if: steps.destroy_plan.outcome == 'failure'
        run: exit 1

      - name: Terraform destroy
        run: terraform destroy -auto-approve -no-color
        env:
          TF_INPUT: false

# =============================================================================
# JOB 6: Notify Destroy
# Report the overall status and outcome of the destroy workflow,
# including whether the infrastructure destruction completed successfully
# or encountered any errors.
# =============================================================================
  notify-destroy:
    name: Notify Destroy
    runs-on: ubuntu-latest
    needs: destroy
    if: always() && github.event.inputs.action == 'destroy'
 
    steps:
      - name: Notify Slack
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: >-
            ${{
              needs.destroy.result == 'success' && 'good' ||
              'danger'
            }}
          SLACK_TITLE: "Terraform CD - DEV | Destroy"
          SLACK_MESSAGE: |
            Branch    : ${{ github.ref_name }}
            Commit    : ${{ github.sha }}
            Actor     : ${{ github.actor }}
            Destroy   : ${{ needs.destroy.result }}
          SLACK_FOOTER: "AWS Three-Tier Architecture | ${{ github.repository }}"
